# RubricMaker — Nginx server block for Virtualmin (Nginx stack)
#
# HOW TO USE:
#   1. Replace every instance of:
#        rubricmaker.example.com  →  your actual domain
#        /home/rubricmaker        →  /home/YOUR_VIRTUALMIN_USER
#
#   2. Place this file at:
#        /etc/nginx/conf.d/rubricmaker.example.com.conf
#      OR paste the relevant blocks into the Virtualmin-managed
#        /etc/nginx/sites-enabled/rubricmaker.example.com.conf
#
#   3. Test and reload:
#        sudo nginx -t && sudo systemctl reload nginx
#
# NOTE: Virtualmin manages the SSL certificate paths. If Let's Encrypt
# is configured via Virtualmin, it will update the ssl_certificate lines
# automatically. The paths shown here are the typical Virtualmin defaults.
# ─────────────────────────────────────────────────────────────────────────────

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name rubricmaker.example.com;
    return 301 https://$host$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    server_name rubricmaker.example.com;

    # ── Document root ──────────────────────────────────────────────────────
    root  /home/rubricmaker/public_html;
    index index.html;

    # ── SSL (Virtualmin / Let's Encrypt) ───────────────────────────────────
    ssl_certificate     /home/rubricmaker/ssl.cert;
    ssl_certificate_key /home/rubricmaker/ssl.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Logging ────────────────────────────────────────────────────────────
    access_log /var/log/virtualmin/rubricmaker.example.com_access_log;
    error_log  /var/log/virtualmin/rubricmaker.example.com_error_log;

    # ── Gzip compression ───────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml
        font/woff2
        application/manifest+json;

    # ── Security headers ───────────────────────────────────────────────────
    add_header X-Content-Type-Options   "nosniff"                          always;
    add_header X-Frame-Options          "SAMEORIGIN"                       always;
    add_header X-XSS-Protection         "1; mode=block"                    always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin"  always;
    add_header Permissions-Policy       "geolocation=(), camera=(), payment=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Caching ────────────────────────────────────────────────────────────
    # Vite hashes JS/CSS/image filenames — safe to cache for 1 year
    location ~* \.(js|css|woff2?|ttf|eot|otf|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires     1y;
        add_header  Cache-Control "public, max-age=31536000, immutable";
        access_log  off;
    }

    # Never cache index.html so browsers always fetch the latest asset list
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma        "no-cache";
        add_header Expires       "0";
    }

    # ── SPA routing ────────────────────────────────────────────────────────
    # RubricMaker uses HashRouter so the server never receives sub-routes.
    # This try_files block is a safeguard for direct /index.html access
    # and future routing changes.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Deny hidden files ──────────────────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
