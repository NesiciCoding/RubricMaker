# RubricMaker — Nginx conf extension for HestiaCP (Nginx + Apache stack)
#
# HOW TO USE:
#   HestiaCP generates its Nginx configs automatically. Customise them by
#   dropping snippet files into the domain's conf directory — HestiaCP
#   includes them automatically on rebuild.
#
#   1. Replace every instance of:
#        rubricmaker.example.com  →  your actual domain
#        /home/rubricmaker        →  /home/YOUR_HESTIACP_USER
#
#   2. Copy this file to the server for the HTTPS (SSL) vhost:
#        /home/rubricmaker/conf/web/rubricmaker.example.com/nginx.ssl.conf_after
#
#      For the plain-HTTP vhost as well (redirected to HTTPS, so optional):
#        /home/rubricmaker/conf/web/rubricmaker.example.com/nginx.conf_after
#
#   3. Rebuild / reload the Nginx config:
#        sudo hestia-nginx rebuild
#        # or:
#        sudo systemctl reload nginx
#
# NOTE: HestiaCP's default proxy template already defines location / (it
# proxies to Apache on port 8080). This file adds cache headers and security
# headers on top — it does NOT redefine location /. The .htaccess file
# handles SPA routing on the Apache side.
#
# LOGGING: HestiaCP writes access/error logs per-domain to
#   /var/log/$WEB_SYSTEM/domains/rubricmaker.example.com.log
#   /var/log/$WEB_SYSTEM/domains/rubricmaker.example.com.error.log
# (e.g. /var/log/apache2/domains/ and /var/log/nginx/domains/). To feed these
# into the optional observability stack (docker-compose.observability.yml),
# set RUBRICMAKER_LOG_DIR=/var/log.
# ─────────────────────────────────────────────────────────────────────────────

# ── Security headers ──────────────────────────────────────────────────────────
add_header X-Content-Type-Options   "nosniff"                          always;
add_header X-Frame-Options          "SAMEORIGIN"                       always;
add_header X-XSS-Protection         "1; mode=block"                    always;
add_header Referrer-Policy          "strict-origin-when-cross-origin"  always;
add_header Permissions-Policy       "geolocation=(), camera=(), payment=()" always;
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
# CSP: script-src has no 'unsafe-inline' — Vite production builds emit no inline
# scripts. The self-hosted Supabase URL is included in connect-src.
add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' https://supabase.rubricmaker.nl wss://supabase.rubricmaker.nl https://*.supabase.co wss://*.supabase.co https://api.languagetool.org https://api.commonstandardsproject.com; worker-src 'self' blob:; frame-src data: blob:;" always;

# ── Cache: Vite-hashed assets (JS/CSS/fonts/images) ─────────────────────────
# Vite fingerprints all asset filenames, so 1-year caching is safe.
# NOTE: nginx only inherits server-level add_header values when a location
# defines NO add_header of its own. Because we set Cache-Control here, all
# security headers must be re-declared so they are included in the response.
location ~* \.(js|css|woff2?|ttf|eot|otf|svg|png|jpg|jpeg|gif|ico|webp)$ {
    expires     1y;
    add_header  Cache-Control                "public, max-age=31536000, immutable" always;
    add_header  X-Content-Type-Options       "nosniff"                             always;
    add_header  X-Frame-Options              "SAMEORIGIN"                          always;
    add_header  X-XSS-Protection             "1; mode=block"                       always;
    add_header  Referrer-Policy              "strict-origin-when-cross-origin"     always;
    add_header  Permissions-Policy           "geolocation=(), camera=(), payment=()" always;
    add_header  Strict-Transport-Security    "max-age=31536000; includeSubDomains" always;
    add_header  Content-Security-Policy      "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' https://supabase.rubricmaker.nl wss://supabase.rubricmaker.nl https://*.supabase.co wss://*.supabase.co https://api.languagetool.org https://api.commonstandardsproject.com; worker-src 'self' blob:; frame-src data: blob:;" always;
    access_log  off;
    # Proxy to Apache so HestiaCP's existing backend still serves the file
    proxy_pass  http://127.0.0.1:8080;
    proxy_set_header Host            $host;
    proxy_set_header X-Real-IP       $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
}

# ── Cache: never cache index.html ────────────────────────────────────────────
# Security headers must be re-declared here for the same inheritance reason.
location = /index.html {
    add_header Cache-Control                "no-cache, no-store, must-revalidate"  always;
    add_header Pragma                       "no-cache"                             always;
    add_header Expires                      "0"                                    always;
    add_header X-Content-Type-Options       "nosniff"                              always;
    add_header X-Frame-Options              "SAMEORIGIN"                           always;
    add_header X-XSS-Protection             "1; mode=block"                        always;
    add_header Referrer-Policy              "strict-origin-when-cross-origin"      always;
    add_header Permissions-Policy           "geolocation=(), camera=(), payment=()" always;
    add_header Strict-Transport-Security    "max-age=31536000; includeSubDomains"  always;
    add_header Content-Security-Policy      "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' https://supabase.rubricmaker.nl wss://supabase.rubricmaker.nl https://*.supabase.co wss://*.supabase.co https://api.languagetool.org https://api.commonstandardsproject.com; worker-src 'self' blob:; frame-src data: blob:;" always;
    proxy_pass  http://127.0.0.1:8080;
    proxy_set_header Host            $host;
    proxy_set_header X-Real-IP       $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
}


