# RubricMaker — Apache virtual host directives for Virtualmin
#
# HOW TO USE:
#   Option A (recommended):  Paste the <Directory> block below into
#     Virtualmin → Server Configuration → Website Options → Apache directives
#     Virtualmin preserves this field when it regenerates the vhost file.
#
#   Option B: Paste the entire <VirtualHost> block as a reference
#     into /etc/apache2/sites-enabled/rubricmaker.example.com.conf
#     Be aware Virtualmin may overwrite this file on certain config changes.
#
# Replace every instance of:
#   rubricmaker.example.com  →  your actual domain
#   /home/rubricmaker        →  /home/YOUR_VIRTUALMIN_USER
#
# LOGGING: Virtualmin writes access/error logs to
#   /var/log/virtualmin/rubricmaker.example.com_access_log
#   /var/log/virtualmin/rubricmaker.example.com_error_log
# To feed these into the optional observability stack
# (docker-compose.observability.yml), set RUBRICMAKER_LOG_DIR=/var/log/virtualmin.
# ─────────────────────────────────────────────────────────────────────────────

# ── Paste this block into the "Apache directives" field in Virtualmin ─────────
<Directory /home/rubricmaker/public_html>
    Options -Indexes +FollowSymLinks
    AllowOverride All

    # SPA fallback (HashRouter means this is rarely hit, but keeps direct
    # /index.html requests clean and guards against future router changes)
    <IfModule mod_rewrite.c>
        RewriteEngine On
        RewriteBase /
        RewriteRule ^index\.html$ - [L]
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule . /index.html [L]
    </IfModule>

    # Security headers
    <IfModule mod_headers.c>
        Header always set X-Content-Type-Options   "nosniff"
        Header always set X-Frame-Options          "SAMEORIGIN"
        Header always set X-XSS-Protection         "1; mode=block"
        Header always set Referrer-Policy          "strict-origin-when-cross-origin"
        Header always set Permissions-Policy       "geolocation=(), camera=(), payment=()"
        Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
        # CSP: no 'unsafe-inline' in script-src — Vite builds emit no inline scripts.
        # Add your self-hosted Supabase URL to connect-src if applicable.
        Header always set Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' https://*.supabase.co https://api.languagetool.org https://api.commonstandardsproject.com; worker-src 'self' blob:; frame-src data: blob:;"

        # Hashed assets: cache for 1 year
        <FilesMatch "\.(js|css|woff2?|ttf|svg|png|jpg|jpeg|gif|ico|webp)$">
            Header set Cache-Control "public, max-age=31536000, immutable"
        </FilesMatch>

        # index.html: never cache (ensures fresh asset hashes on update)
        <FilesMatch "^index\.html$">
            Header set Cache-Control "no-cache, no-store, must-revalidate"
            Header set Pragma        "no-cache"
            Header set Expires       "0"
        </FilesMatch>
    </IfModule>

    # Compression
    <IfModule mod_deflate.c>
        AddOutputFilterByType DEFLATE text/html text/css application/javascript
        AddOutputFilterByType DEFLATE application/json image/svg+xml font/woff2
    </IfModule>
</Directory>


# ─────────────────────────────────────────────────────────────────────────────
# FULL VHOST REFERENCE (for documentation — Virtualmin manages this file)
# ─────────────────────────────────────────────────────────────────────────────
#
# <VirtualHost *:443>
#     ServerName  rubricmaker.example.com
#     DocumentRoot /home/rubricmaker/public_html
#
#     SSLEngine on
#     SSLCertificateFile    /home/rubricmaker/ssl.cert
#     SSLCertificateKeyFile /home/rubricmaker/ssl.key
#     # Virtualmin fills the SSL paths in automatically.
#
#     <Directory /home/rubricmaker/public_html>
#         ... (paste the Directory block above here)
#     </Directory>
#
#     ErrorLog  /var/log/virtualmin/rubricmaker.example.com_error_log
#     CustomLog /var/log/virtualmin/rubricmaker.example.com_access_log combined
# </VirtualHost>
#
# <VirtualHost *:80>
#     ServerName rubricmaker.example.com
#     Redirect permanent / https://rubricmaker.example.com/
# </VirtualHost>
