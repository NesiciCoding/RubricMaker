# RubricMaker — Apache directives for HestiaCP
#
# HOW TO USE:
#   Option A (recommended — .htaccess):
#     The simplest approach. HestiaCP's Apache vhost uses AllowOverride All
#     by default, so deploy/.htaccess works as-is. Just upload it to the
#     public_html directory (deploy.sh does this automatically).
#     No changes to the vhost file are needed.
#
#   Option B — vhost conf extension:
#     For server-level directives (no AllowOverride overhead), drop this file
#     into the HestiaCP conf extension path:
#       /home/rubricmaker/conf/web/rubricmaker.example.com/apache2.conf_after
#     HestiaCP includes it automatically when it rebuilds the vhost.
#
#   Replace every instance of:
#     rubricmaker.example.com  →  your actual domain
#     /home/rubricmaker        →  /home/YOUR_HESTIACP_USER
#     supabase.example.com     →  your self-hosted Supabase domain (in the CSP
#                                  connect-src below; drop it if you're on
#                                  Supabase Cloud instead of self-hosting)
#
# LOGGING: HestiaCP writes access/error logs per-domain to
#   /var/log/$WEB_SYSTEM/domains/rubricmaker.example.com.log
#   /var/log/$WEB_SYSTEM/domains/rubricmaker.example.com.error.log
# (e.g. /var/log/apache2/domains/). To feed these into the optional
# observability stack (docker-compose.observability.yml), set
# RUBRICMAKER_LOG_DIR=/var/log.
# ─────────────────────────────────────────────────────────────────────────────

# ── Paste into apache2.conf_after (Option B) ─────────────────────────────────
<Directory /home/rubricmaker/web/rubricmaker.example.com/public_html>
    Options -Indexes +FollowSymLinks
    AllowOverride All

    # SPA fallback (HashRouter means this is rarely hit — keeps direct
    # /index.html requests clean and guards against future router changes)
    <IfModule mod_rewrite.c>
        RewriteEngine On
        RewriteBase /
        RewriteRule ^index\.html$ - [L]
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule . /index.html [L]
    </IfModule>

    # Security headers
    <IfModule mod_headers.c>
        Header always set X-Content-Type-Options   "nosniff"
        Header always set X-Frame-Options          "SAMEORIGIN"
        Header always set X-XSS-Protection         "1; mode=block"
        Header always set Referrer-Policy          "strict-origin-when-cross-origin"
        Header always set Permissions-Policy       "geolocation=(), camera=(), payment=()"
        Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
        # CSP: no 'unsafe-inline' in script-src — Vite builds emit no inline scripts.
        # connect-src: replace supabase.example.com with your self-hosted
        # Supabase domain (drop it if you're on Supabase Cloud — the
        # *.supabase.co wildcard already covers that).
        Header always set Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' https://supabase.example.com wss://supabase.example.com https://*.supabase.co wss://*.supabase.co https://api.languagetool.org https://api.commonstandardsproject.com; worker-src 'self' blob:; frame-src data: blob:;"

        # Hashed assets: cache for 1 year
        <FilesMatch "\.(js|css|woff2?|ttf|svg|png|jpg|jpeg|gif|ico|webp)$">
            Header set Cache-Control "public, max-age=31536000, immutable"
        </FilesMatch>

        # index.html: never cache
        <FilesMatch "^index\.html$">
            Header set Cache-Control "no-cache, no-store, must-revalidate"
            Header set Pragma        "no-cache"
            Header set Expires       "0"
        </FilesMatch>
    </IfModule>

    # Compression
    <IfModule mod_deflate.c>
        AddOutputFilterByType DEFLATE text/html text/css application/javascript
        AddOutputFilterByType DEFLATE application/json image/svg+xml font/woff2
    </IfModule>
</Directory>


# ─────────────────────────────────────────────────────────────────────────────
# FULL VHOST REFERENCE (for documentation — HestiaCP manages this file)
# HestiaCP's Apache vhost is at:
#   /home/rubricmaker/conf/web/rubricmaker.example.com/apache2.conf   (HTTP)
#   /home/rubricmaker/conf/web/rubricmaker.example.com/apache2.ssl.conf (HTTPS)
# ─────────────────────────────────────────────────────────────────────────────
#
# <VirtualHost 127.0.0.1:8080>
#     ServerName  rubricmaker.example.com
#     DocumentRoot /home/rubricmaker/web/rubricmaker.example.com/public_html
#
#     <Directory /home/rubricmaker/web/rubricmaker.example.com/public_html>
#         ... (paste the Directory block above here)
#     </Directory>
#
#     ErrorLog  /home/rubricmaker/web/rubricmaker.example.com/log/error.log
#     CustomLog /home/rubricmaker/web/rubricmaker.example.com/log/access.log combined
# </VirtualHost>
