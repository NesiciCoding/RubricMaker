version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 10
    groups:
      dev-tooling:
        patterns:
          - "@types/*"
          - "eslint*"
          - "typescript*"
          - "vite*"
          - "vitest*"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "react-router*"
          - "@types/react*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
