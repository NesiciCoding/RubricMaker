name: Deploy to HestiaCP VPS

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: "hestiacp-deploy"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          SUPABASE_PUBLIC_URL: ${{ secrets.SUPABASE_PUBLIC_URL }}
          # Optional diagnostic event stream to `client_logs` — see README →
          # "Stress-test logging". Toggle via repo Settings → Secrets and
          # variables → Actions → Variables (not a secret: it's a feature
          # flag, not sensitive data).
          VITE_STRESS_TEST_LOGGING: ${{ vars.VITE_STRESS_TEST_LOGGING }}

      - name: Deploy via rsync
        uses: burnett01/rsync-deployments@9.0.0
        with:
          switches: -avz --delete
          path: dist/
          # HestiaCP web root: /home/<user>/web/<domain>/public_html/
          remote_path: /home/rubricmaker/web/${{ secrets.VPS_DOMAIN }}/public_html/
          remote_host: ${{ secrets.VPS_HOST }}
          remote_user: root
          remote_key: ${{ secrets.VPS_SSH_KEY }}

      - name: Upload .htaccess
        uses: burnett01/rsync-deployments@9.0.0
        with:
          switches: -avz
          path: deploy/.htaccess
          remote_path: /home/rubricmaker/web/${{ secrets.VPS_DOMAIN }}/public_html/.htaccess
          remote_host: ${{ secrets.VPS_HOST }}
          remote_user: root
          remote_key: ${{ secrets.VPS_SSH_KEY }}
