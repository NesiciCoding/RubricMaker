name: Crowdin — Sync translations

on:
  push:
    branches: [main]
    paths:
      - "src/locales/en.json"
  workflow_dispatch:

jobs:
  crowdin:
    name: Upload sources & download translations
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Crowdin sync
        uses: crowdin/github-action@v2
        with:
          upload_sources: true
          upload_translations: false
          download_translations: true
          create_pull_request: true
          pull_request_title: "chore: update translations from Crowdin"
          pull_request_body: "Automated pull request with the latest translations from Crowdin."
          pull_request_base_branch_name: main
          localization_branch_name: chore/crowdin-translations
          skip_untranslated_strings: true
          export_only_approved: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}
