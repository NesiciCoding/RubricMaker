name: CI

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  ci:
    name: Type-check, Lint & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # required by vitest-coverage-report-action to post PR comments
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Test with coverage
        run: npm run coverage

      - name: Coverage comment
        if: always()
        uses: davelosert/vitest-coverage-report-action@3c054a2d2e2ca45446417ad5d6d5eb33092af8f1 # v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox

      - name: Run E2E tests
        run: npm run e2e -- --project=chromium --project=firefox
        env:
          CI: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-results
          path: playwright-results/
          retention-days: 14

  e2e-supabase:
    name: E2E — Supabase Integration
    runs-on: ubuntu-latest
    needs: e2e
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Install Supabase CLI
        uses: supabase/setup-cli@3c2f5e2ae34c34e428e8e206e2c4d21fa2d20fbf # v2.1.1
        with:
          version: 2.104.0

      - name: Start local Supabase stack
        run: supabase start
        timeout-minutes: 5

      - name: Export Supabase credentials
        run: |
          STATUS=$(supabase status)
          # Supabase CLI v2 uses sb_publishable_* / sb_secret_* keys in a table.
          # Older CLI versions used "anon key:" / "service_role key:" with JWTs.
          ANON_KEY=$(echo "$STATUS" | grep -oE 'sb_publishable_[A-Za-z0-9_-]+')
          SVC_KEY=$(echo "$STATUS" | grep -oE 'sb_secret_[A-Za-z0-9_-]+')
          # Legacy JWT fallback
          if [ -z "$ANON_KEY" ]; then
            ANON_KEY=$(echo "$STATUS" | awk '/anon key:/{print $NF}')
          fi
          if [ -z "$SVC_KEY" ]; then
            SVC_KEY=$(echo "$STATUS" | awk '/service_role key:/{print $NF}')
          fi
          if [ -z "$ANON_KEY" ] || [ -z "$SVC_KEY" ]; then
            echo "::error::Failed to extract Supabase credentials from supabase status"
            echo "$STATUS"
            exit 1
          fi
          echo "SUPABASE_TEST_URL=http://127.0.0.1:54321" >> $GITHUB_ENV
          echo "SUPABASE_TEST_ANON_KEY=$ANON_KEY" >> $GITHUB_ENV
          echo "SUPABASE_TEST_SERVICE_KEY=$SVC_KEY" >> $GITHUB_ENV

      - name: Run Supabase E2E tests
        run: npm run e2e:supabase
        env:
          CI: true

      - name: Stop local Supabase stack
        if: always()
        run: supabase stop --no-backup

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report-supabase
          path: playwright-report/
          retention-days: 14

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-results-supabase
          path: playwright-results/
          retention-days: 14

  bundle:
    name: Bundle Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build with bundle stats
        run: npm run build
        env:
          VITE_ANALYZE: 'true'

      - name: Check bundle size
        run: |
          TOTAL=$(find dist/assets -name '*.js' -type f -printf '%s\n' | awk '{s+=$1} END {print s+0}')
          echo "Total JS bundle size: ${TOTAL} bytes ($(( TOTAL / 1024 )) KB)"
          if [ "$TOTAL" -gt 6000000 ]; then
            echo "::warning::Bundle exceeds 6 MB — review heavy imports"
          fi

      - name: Upload bundle stats
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bundle-stats
          path: dist/stats.html
          retention-days: 14
