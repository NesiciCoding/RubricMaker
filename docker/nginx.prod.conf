# nginx config for the docker-compose production setup.
# Serves the static app AND proxies all Supabase API calls,
# so the browser only ever talks to one address (the app port).

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Written to Docker's json-file log driver, which Promtail's Docker scrape
    # job picks up directly — see docker-compose.observability.yml.
    access_log /dev/stdout;
    error_log /dev/stderr warn;

    # ── Supabase REST API (PostgREST) ─────────────────────────────────────────
    location /rest/v1/ {
        proxy_pass         http://rest:3000/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── Supabase Auth (GoTrue) ────────────────────────────────────────────────
    location /auth/v1/ {
        proxy_pass         http://auth:9999/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── Supabase Storage ──────────────────────────────────────────────────────
    location /storage/v1/ {
        proxy_pass         http://storage:5000/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        client_max_body_size 55m;
    }

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Content-Type-Options   "nosniff"                       always;
    add_header X-Frame-Options          "SAMEORIGIN"                    always;
    add_header X-XSS-Protection         "1; mode=block"                 always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "geolocation=(), camera=(), payment=()" always;
    # 'unsafe-inline' omitted from script-src: Vite production builds contain no
    # inline scripts. style-src retains it for TipTap / React inline styles.
    # frame-src covers data:/blob: URIs used by the attachment-viewer iframes.
    add_header Content-Security-Policy
        "default-src 'self'; "
        "script-src 'self'; "
        "style-src 'self' 'unsafe-inline'; "
        "img-src 'self' data: blob:; "
        "font-src 'self' data:; "
        "connect-src 'self' https://*.supabase.co https://api.languagetool.org https://api.commonstandardsproject.com; "
        "worker-src 'self' blob:; "
        "frame-src data: blob:;"
        always;

    # ── Static app (SPA fallback) ─────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
