# nginx config for the docker-compose production setup.
# Serves the static app AND proxies all Supabase API calls,
# so the browser only ever talks to one address (the app port).

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ── Supabase REST API (PostgREST) ─────────────────────────────────────────
    location /rest/v1/ {
        proxy_pass         http://rest:3000/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── Supabase Auth (GoTrue) ────────────────────────────────────────────────
    location /auth/v1/ {
        proxy_pass         http://auth:9999/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── Supabase Storage ──────────────────────────────────────────────────────
    location /storage/v1/ {
        proxy_pass         http://storage:5000/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        client_max_body_size 55m;
    }

    # ── Static app (SPA fallback) ─────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
