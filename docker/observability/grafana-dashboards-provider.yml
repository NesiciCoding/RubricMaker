# Provisions the dashboards in docker/observability/dashboards/ on startup.
# Grafana re-scans this path every updateIntervalSeconds, so editing a JSON
# file here and restarting (or waiting) updates the dashboard. Dashboards
# edited via the UI are not written back to these files (allowUiUpdates only
# affects whether UI edits are *permitted*, not persisted to disk).

apiVersion: 1

providers:
  - name: RubricMaker
    orgId: 1
    folder: RubricMaker
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards/json
