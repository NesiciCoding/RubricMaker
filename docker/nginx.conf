server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Content-Type-Options   "nosniff"                       always;
    add_header X-Frame-Options          "SAMEORIGIN"                    always;
    add_header X-XSS-Protection         "1; mode=block"                 always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "geolocation=(), camera=(), payment=()" always;
    # CSP: allow self + Supabase cloud + LanguageTool (PDF.js worker is bundled locally)
    # 'unsafe-inline' is intentionally absent from script-src: Vite's production
    # build emits no inline scripts, so it is not required. style-src retains it
    # because TipTap and React components use inline styles.
    # frame-src covers data:/blob: URIs used by the attachment-viewer iframes.
    add_header Content-Security-Policy
        "default-src 'self'; "
        "script-src 'self'; "
        "style-src 'self' 'unsafe-inline'; "
        "img-src 'self' data: blob:; "
        "font-src 'self' data:; "
        "connect-src 'self' https://*.supabase.co https://api.languagetool.org https://api.commonstandardsproject.com; "
        "worker-src 'self' blob:; "
        "frame-src data: blob:;"
        always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
