<!DOCTYPE html>
<html lang="en">
  <body style="font-family: -apple-system, Helvetica, Arial, sans-serif; color: #1f2937; padding: 24px; max-width: 480px; margin: 0 auto;">
    <h2 style="margin: 0 0 16px;">Your RubricMaker sign-in code</h2>
    <p style="margin: 0 0 16px;">Enter this code in RubricMaker to sign in:</p>
    <p style="font-size: 32px; font-weight: 700; letter-spacing: 6px; margin: 0 0 16px;">{{ .Token }}</p>
    <p style="margin: 0; color: #6b7280; font-size: 13px;">
      This code expires in 1 hour. If you didn't request it, you can safely ignore this email.
    </p>
  </body>
</html>
