# Supabase local development configuration
# Run `supabase start` to start the local stack (requires Docker)
# The printed URL and anon key can be pasted into RubricMaker Settings > Database

[api]
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
port = 54323

[inbucket]
# Local SMTP server for magic-link emails during development
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
# Increase if you need to test large attachment uploads locally
file_size_limit = "52mb"

[auth]
site_url = "http://localhost:5173"
# Allow anonymous sign-in (used as the default auth method before email login)
enable_anonymous_sign_ins = true
# Email OTP for magic-link login (no password required)
[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false  # set to true in production

[[auth.mfa.totp]]
enroll_enabled = false
verify_enabled = false
