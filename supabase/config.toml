# Supabase local development configuration
# Run `supabase start` to start the local stack (requires Docker)
# The printed URL and anon key can be pasted into RubricMaker Settings > Database

[api]
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
port = 54323

[inbucket]
# Local SMTP server for magic-link emails during development
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
# Increase if you need to test large attachment uploads locally
file_size_limit = "52mb"

[auth]
# In production: change this to the URL where the app is served (e.g. http://192.168.1.10:8080)
site_url = "http://localhost:5173"
# Allow anonymous sign-in (default auth before teacher adds email)
enable_anonymous_sign_ins = true

[auth.email]
enable_signup = true
double_confirm_changes = true
# Development: false (Inbucket catches emails, no real delivery needed)
# Production:  true  (requires SMTP config below)
enable_confirmations = false

# ── Production SMTP ────────────────────────────────────────────────────────────
# Uncomment and fill in when deploying to a server.
# Common options: school Exchange/Office 365, Gmail app-password, Brevo (free tier).
#
# [auth.email.smtp]
# host     = "smtp.office365.com"    # or smtp.gmail.com / smtp-relay.brevo.com
# port     = 587
# user     = "rubricmaker@school.nl"
# pass     = "env(SMTP_PASSWORD)"    # set SMTP_PASSWORD in the server environment
# admin_email = "rubricmaker@school.nl"
# sender_name = "RubricMaker"

[[auth.mfa.totp]]
enroll_enabled = false
verify_enabled = false
